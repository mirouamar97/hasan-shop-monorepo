# HASAN SHOP — Production stack
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.production up -d

name: hasan-shop-prod

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hasan-shop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hasan_shop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-hasan_shop}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-hasan_shop} -d ${POSTGRES_DB:-hasan_shop}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    logging: *default-logging
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: hasan-shop-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging: *default-logging
    networks:
      - internal

  meilisearch:
    image: getmeili/meilisearch:v1.14
    container_name: hasan-shop-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:?MEILISEARCH_API_KEY required}
      MEILI_NO_ANALYTICS: 'true'
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:7700/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    logging: *default-logging
    networks:
      - internal

  minio:
    image: minio/minio:latest
    container_name: hasan-shop-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY required}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9000/minio/health/live || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    logging: *default-logging
    networks:
      - internal

  clamav:
    image: clamav/clamav:1.4
    container_name: hasan-shop-clamav
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ['CMD-SHELL', 'clamdscan --ping || exit 1']
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    logging: *default-logging
    networks:
      - internal

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: hasan-shop-migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hasan_shop}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hasan_shop}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: hasan-shop-api
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-hasan_shop}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hasan_shop}
      REDIS_URL: redis://redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      S3_ENDPOINT: http://minio:9000
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      clamav:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
    ports:
      - '4000:4000'
    logging: *default-logging
    networks:
      - internal

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:4000}
    container_name: hasan-shop-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    ports:
      - '3001:3001'
    logging: *default-logging
    networks:
      - internal

  storefront:
    build:
      context: .
      dockerfile: Dockerfile.storefront
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:4000}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
    container_name: hasan-shop-storefront
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    ports:
      - '3000:3000'
    logging: *default-logging
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: hasan-shop-nginx
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      api:
        condition: service_healthy
      admin:
        condition: service_healthy
      storefront:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging: *default-logging
    networks:
      - internal
      - public

  backup:
    image: postgres:16-alpine
    container_name: hasan-shop-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-hasan_shop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hasan_shop}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - backup_data:/backups
      - ./docker/backup/backup-cron.sh:/usr/local/bin/backup-cron.sh:ro
    entrypoint: ['/bin/sh', '/usr/local/bin/backup-cron.sh']
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging: *default-logging
    networks:
      - internal

networks:
  internal:
    driver: bridge
  public:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
  clamav_data:
  backup_data:
