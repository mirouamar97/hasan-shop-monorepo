services:
  postgres:
    image: postgres:16-alpine
    container_name: hasan-shop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hasan_shop
      POSTGRES_PASSWORD: hasan_shop_dev
      POSTGRES_DB: hasan_shop
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hasan_shop -d hasan_shop']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hasan-shop-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.14
    container_name: hasan-shop-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: hasan_shop_meili_dev_key
      MEILI_NO_ANALYTICS: 'true'
    ports:
      - '7700:7700'
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:7700/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: hasan-shop-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hasan_shop_minio
      MINIO_ROOT_PASSWORD: hasan_shop_minio_secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    # Host-side health probe in scripts/ci/verify-docker-health.sh (image has no curl/mc)

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
