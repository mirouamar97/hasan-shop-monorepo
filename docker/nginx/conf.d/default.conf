# HASAN SHOP — reverse proxy (Docker Compose production)
# Kubernetes-ready: upstream names map to K8s services (api, admin, storefront)

server {
  listen 80;
  server_name _;

  client_max_body_size 10M;

  # Nginx health for orchestrator
  location /health {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  # API
  location /api/ {
    limit_req zone=api_limit burst=50 nodelay;
    proxy_pass http://api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 60s;
  }

  # Admin dashboard
  location /admin/ {
    limit_req zone=general_limit burst=30 nodelay;
    proxy_pass http://admin_upstream/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Admin root (login)
  location = /admin {
    return 301 /admin/;
  }

  # Storefront (default)
  location / {
    limit_req zone=general_limit burst=100 nodelay;
    proxy_pass http://storefront_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }
}
